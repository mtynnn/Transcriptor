name: Build and Release
on:
  push:
    tags:
      - "v*"

# Permisos para crear releases en GitHub
permissions:
  contents: write

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip packages (ahorra ~3 min)
      - name: cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Cache Rust build artifacts (ahorra ~7 min)
      - name: cache rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: create credentials file
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > backend/credentials.json
          else
            echo "{}" > backend/credentials.json
            echo "Warning: GOOGLE_CREDENTIALS_JSON secret not found."
          fi

      # Cache binario de PyInstaller (ahorra ~2 min si el backend no cambió)
      - name: cache backend exe
        id: cache-backend-exe
        uses: actions/cache@v4
        with:
          path: dist/vtranscriptor-engine.exe
          key: ${{ runner.os }}-backend-${{ hashFiles('backend/**', 'vtranscriptor-engine.spec') }}

      - name: install python dependencies
        if: steps.cache-backend-exe.outputs.cache-hit != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt

      - name: build python backend
        if: steps.cache-backend-exe.outputs.cache-hit != 'true'
        run: |
          pyinstaller --noconfirm vtranscriptor-engine.spec

      - name: prepare sidecar
        shell: bash
        run: |
          cp dist/vtranscriptor-engine.exe src-tauri/vtranscriptor-engine-x86_64-pc-windows-msvc.exe

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "vTranscriptor v__VERSION__"
          releaseBody: "🤖 vTranscriptor: Ahora con instalador One-Click y Google Drive."
          releaseDraft: true
          prerelease: false
