name: Build and Release
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: create credentials file
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > backend/credentials.json
          else
            echo "{}" > backend/credentials.json
            echo "Warning: GOOGLE_CREDENTIALS_JSON secret not found. Build may continue but Drive might not work properly if not provided later."
          fi

      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt

      - name: build python backend
        run: |
          pyinstaller --noconfirm vtranscriptor-engine.spec

      - name: prepare sidecar
        run: |
          mkdir -p src-tauri/bin
          cp dist/vtranscriptor-engine.exe src-tauri/bin/vtranscriptor-engine-x86_64-pc-windows-msvc.exe

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PASSWORD: ${{ secrets.TAURI_SIGNING_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "vTranscriptor v__VERSION__"
          releaseBody: "🤖 vTranscriptor: Ahora con instalador One-Click y Google Drive."
          releaseDraft: true
          prerelease: false
