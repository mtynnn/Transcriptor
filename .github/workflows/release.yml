name: Build and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt
          
      - name: build python backend
        run: |
          pyinstaller --noconfirm vtranscriptor-engine.spec
          
      - name: prepare sidecar
        run: |
          mkdir -p src-tauri/resources/engine
          cp -r dist/vtranscriptor-engine/* src-tauri/resources/engine/
          
      - name: install frontend dependencies
        run: npm install
        
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ 
          releaseName: 'vTranscriptor v__VERSION__'
          releaseBody: '🤖 vTranscriptor: Ahora con instalador One-Click y Google Drive.'
          releaseDraft: true
          prerelease: false
